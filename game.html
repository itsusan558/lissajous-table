<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>リサジュ・スナイパー</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;overflow:hidden;font-family:'Inter','Noto Sans JP',monospace;color:#fff;user-select:none}
canvas{display:block;cursor:crosshair}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:10}
.hud-left,.hud-right,.hud-center{display:flex;gap:20px;align-items:center}
.hud-center{position:absolute;left:50%;transform:translateX(-50%)}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.hud-label{font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase}
.hud-val{font-size:22px;font-weight:800}
.hud-val.score{color:#a5b4fc}
.hud-val.combo{color:#fbbf24}
.hud-val.level{color:#34d399}
.hud-val.time{color:#f472b6}
.hud-val.accuracy{color:#67e8f9}

/* スコアポップアップ */
.score-pop{
  position:fixed;pointer-events:none;z-index:20;
  font-size:24px;font-weight:900;
  animation:popUp 0.8s ease-out forwards;
}
@keyframes popUp{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-60px) scale(1.3)}
}

/* 画面中央メッセージ */
#overlay{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,8,15,0.9);z-index:30;transition:opacity 0.5s;
}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:48px;font-weight:900;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
#overlay p{color:rgba(255,255,255,0.5);font-size:14px;line-height:2;text-align:center;max-width:400px;margin-bottom:30px}
#overlay .start-btn{
  background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;color:#fff;
  padding:14px 40px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all 0.2s;
}
#overlay .start-btn:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(99,102,241,0.4)}
#overlay .sub{font-size:12px;color:rgba(255,255,255,0.25);margin-top:12px}

/* ゲームオーバー */
#gameover{
  position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,8,15,0.92);z-index:30;display:none;
}
#gameover.show{display:flex}
#gameover h1{font-size:36px;font-weight:900;color:#f43f5e;margin-bottom:8px}
#gameover .final-score{font-size:64px;font-weight:900;background:linear-gradient(135deg,#a5b4fc,#c4b5fd);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:16px 0}
#gameover .stats{color:rgba(255,255,255,0.4);font-size:13px;line-height:2;text-align:center;margin-bottom:24px}
#gameover .retry-btn{
  background:linear-gradient(135deg,#f43f5e,#ec4899);border:none;color:#fff;
  padding:14px 40px;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;
  font-family:inherit;transition:all 0.2s;
}
#gameover .retry-btn:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(244,63,94,0.4)}

/* レベルアップ通知 */
.level-up{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:36px;font-weight:900;color:#34d399;pointer-events:none;z-index:25;
  animation:levelPop 1.2s ease-out forwards;
}
@keyframes levelPop{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}
  20%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}
  40%{transform:translate(-50%,-50%) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1) translateY(-40px)}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-left">
    <div class="hud-item"><span class="hud-label">Score</span><span class="hud-val score" id="h-score">0</span></div>
    <div class="hud-item"><span class="hud-label">Combo</span><span class="hud-val combo" id="h-combo">×0</span></div>
  </div>
  <div class="hud-center">
    <div class="hud-item"><span class="hud-label">Level</span><span class="hud-val level" id="h-level">1</span></div>
  </div>
  <div class="hud-right">
    <div class="hud-item"><span class="hud-label">Time</span><span class="hud-val time" id="h-time">60</span></div>
    <div class="hud-item"><span class="hud-label">Accuracy</span><span class="hud-val accuracy" id="h-accuracy">-</span></div>
  </div>
</div>

<div id="overlay">
  <h1>LISSAJOUS SNIPER</h1>
  <p>
    リサジュ曲線上を動くターゲットを撃て！<br>
    曲線の動きを読んでタイミングよくクリック。<br>
    連続ヒットでコンボボーナス。<br>
    ミスでコンボリセット＆時間ペナルティ。
  </p>
  <button class="start-btn" id="btn-start">START</button>
  <div class="sub">Space でも開始</div>
</div>

<div id="gameover">
  <h1>TIME UP</h1>
  <div class="final-score" id="go-score">0</div>
  <div class="stats" id="go-stats"></div>
  <button class="retry-btn" id="btn-retry">RETRY</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── 定数 ──
const GAME_TIME = 60; // 秒
const HIT_RADIUS_BASE = 28;
const MISS_PENALTY = 2; // 秒
const LEVEL_UP_HITS = 5; // N回ヒットでレベルアップ

// ── ゲーム状態 ──
let W, H;
let state = 'title'; // title, playing, gameover
let score = 0;
let combo = 0;
let maxCombo = 0;
let level = 1;
let timeLeft = GAME_TIME;
let lastTime = 0;
let totalShots = 0;
let totalHits = 0;
let angle = 0;
let hitsInLevel = 0;

// ── ターゲット ──
let targets = [];
let particles = []; // ヒットエフェクト
let ripples = []; // クリックリップル
let trailPoints = []; // 曲線の軌跡

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// ── ターゲット生成 ──
function spawnTarget() {
  const freqX = 1 + Math.floor(Math.random() * (level + 2));
  const freqY = 1 + Math.floor(Math.random() * (level + 2));
  // freqXとfreqYが同じだと円になってつまらないので避ける
  const fy = freqY === freqX ? freqY + 1 : freqY;
  const phaseX = Math.random() * Math.PI * 2;
  const phaseY = Math.random() * Math.PI * 2;
  const radiusX = 80 + Math.random() * (Math.min(W, H) * 0.2);
  const radiusY = 80 + Math.random() * (Math.min(W, H) * 0.2);
  const cx = W * 0.2 + Math.random() * W * 0.6;
  const cy = H * 0.2 + Math.random() * H * 0.6;
  const speedMult = 0.8 + level * 0.15 + Math.random() * 0.3;
  const hue = Math.random() * 360;

  targets.push({
    freqX, freqY: fy, phaseX, phaseY,
    radiusX, radiusY, cx, cy,
    speedMult, hue,
    x: 0, y: 0,
    trail: [],
    age: 0,
    hitRadius: Math.max(HIT_RADIUS_BASE - level * 1.5, 12),
    points: Math.max(10 + level * 5, 10),
  });
}

function ensureTargets() {
  const desired = Math.min(1 + Math.floor(level / 2), 5);
  while (targets.length < desired) spawnTarget();
}

// ── ヒットエフェクト ──
function spawnHitParticles(x, y, hue) {
  for (let i = 0; i < 20; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.02,
      hue,
      size: 2 + Math.random() * 3,
    });
  }
}

function spawnRipple(x, y, hit) {
  ripples.push({ x, y, r: 0, maxR: hit ? 60 : 30, life: 1, hit });
}

// ── 更新 ──
function update(dt) {
  if (state !== 'playing') return;

  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    gameOver();
    return;
  }

  angle += dt * 2;
  ensureTargets();

  // ターゲット更新
  for (const t of targets) {
    t.age += dt;
    const a = angle * t.speedMult;
    t.x = t.cx + Math.cos(a * t.freqX + t.phaseX) * t.radiusX;
    t.y = t.cy + Math.sin(a * t.freqY + t.phaseY) * t.radiusY;

    t.trail.push({ x: t.x, y: t.y });
    if (t.trail.length > 120) t.trail.shift();
  }

  // パーティクル更新
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1; // 重力
    p.vx *= 0.98;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // リップル更新
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.r += (r.maxR - r.r) * 0.15;
    r.life -= 0.04;
    if (r.life <= 0) ripples.splice(i, 1);
  }
}

// ── 描画 ──
function draw() {
  // 暗い背景（残像効果なし、クリアに）
  ctx.fillStyle = '#08080f';
  ctx.fillRect(0, 0, W, H);

  if (state === 'title') {
    // タイトル画面の背景リサジュ
    drawBgLissajous();
    return;
  }

  // リップル
  for (const r of ripples) {
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    const color = r.hit ? `rgba(99,255,150,${r.life * 0.3})` : `rgba(255,80,80,${r.life * 0.3})`;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // ターゲットの軌跡と本体
  for (const t of targets) {
    // 軌跡
    if (t.trail.length > 1) {
      for (let i = 1; i < t.trail.length; i++) {
        const alpha = (i / t.trail.length) * 0.4;
        ctx.beginPath();
        ctx.moveTo(t.trail[i - 1].x, t.trail[i - 1].y);
        ctx.lineTo(t.trail[i].x, t.trail[i].y);
        ctx.strokeStyle = `hsla(${t.hue},70%,60%,${alpha})`;
        ctx.lineWidth = 1.5;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    }

    // ターゲット本体（同心円）
    // 外側のリング（ヒット範囲）
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.hitRadius, 0, Math.PI * 2);
    ctx.strokeStyle = `hsla(${t.hue},70%,60%,0.3)`;
    ctx.lineWidth = 1;
    ctx.stroke();

    // 内側の点
    ctx.beginPath();
    ctx.arc(t.x, t.y, 5, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${t.hue},80%,70%,0.9)`;
    ctx.fill();

    // グロー
    const glow = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, t.hitRadius);
    glow.addColorStop(0, `hsla(${t.hue},80%,70%,0.15)`);
    glow.addColorStop(1, `hsla(${t.hue},80%,70%,0)`);
    ctx.fillStyle = glow;
    ctx.fillRect(t.x - t.hitRadius, t.y - t.hitRadius, t.hitRadius * 2, t.hitRadius * 2);

    // ポイント表示
    ctx.fillStyle = `hsla(${t.hue},60%,70%,0.5)`;
    ctx.font = '10px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`${t.points}pt`, t.x, t.y - t.hitRadius - 8);
  }

  // パーティクル
  for (const p of particles) {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${p.hue},80%,70%,${p.life})`;
    ctx.fill();
  }

  // クロスヘア（マウス位置）
  drawCrosshair();
}

let mouseX = -100, mouseY = -100;

function drawCrosshair() {
  const size = 15;
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;

  ctx.beginPath();
  ctx.moveTo(mouseX - size, mouseY); ctx.lineTo(mouseX - 5, mouseY);
  ctx.moveTo(mouseX + 5, mouseY); ctx.lineTo(mouseX + size, mouseY);
  ctx.moveTo(mouseX, mouseY - size); ctx.lineTo(mouseX, mouseY - 5);
  ctx.moveTo(mouseX, mouseY + 5); ctx.lineTo(mouseX, mouseY + size);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(mouseX, mouseY, 2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fill();
}

function drawBgLissajous() {
  const cx = W / 2, cy = H / 2;
  const r = Math.min(W, H) * 0.3;
  const t = performance.now() * 0.001;

  ctx.beginPath();
  for (let i = 0; i <= 500; i++) {
    const a = (i / 500) * Math.PI * 2 * 3 + t;
    const x = cx + Math.cos(a * 3) * r;
    const y = cy + Math.sin(a * 2) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.strokeStyle = 'rgba(99,102,241,0.08)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// ── クリック処理 ──
function handleClick(x, y) {
  if (state !== 'playing') return;

  totalShots++;
  let hit = false;

  for (let i = targets.length - 1; i >= 0; i--) {
    const t = targets[i];
    const dx = x - t.x, dy = y - t.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < t.hitRadius) {
      hit = true;
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      totalHits++;
      hitsInLevel++;

      // スコア計算（コンボボーナス + 精度ボーナス）
      const accuracyBonus = Math.round((1 - dist / t.hitRadius) * 20);
      const comboBonus = Math.min(combo, 20) * 5;
      const pts = t.points + accuracyBonus + comboBonus;
      score += pts;

      // エフェクト
      spawnHitParticles(t.x, t.y, t.hue);
      spawnRipple(x, y, true);
      showScorePop(t.x, t.y, pts, t.hue);

      // ターゲット除去
      targets.splice(i, 1);

      // レベルアップ
      if (hitsInLevel >= LEVEL_UP_HITS) {
        level++;
        hitsInLevel = 0;
        showLevelUp();
        timeLeft = Math.min(timeLeft + 3, GAME_TIME); // ボーナスタイム
      }

      break; // 1クリック1ヒット
    }
  }

  if (!hit) {
    combo = 0;
    timeLeft = Math.max(0, timeLeft - MISS_PENALTY);
    spawnRipple(x, y, false);
    showScorePop(x, y, `-${MISS_PENALTY}s`, 0);
  }

  updateHUD();
}

// ── ポップアップ ──
function showScorePop(x, y, text, hue) {
  const el = document.createElement('div');
  el.className = 'score-pop';
  el.textContent = typeof text === 'number' ? `+${text}` : text;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  el.style.color = typeof text === 'number' ? `hsl(${hue},80%,70%)` : '#f43f5e';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function showLevelUp() {
  const el = document.createElement('div');
  el.className = 'level-up';
  el.textContent = `LEVEL ${level}`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ── HUD更新 ──
function updateHUD() {
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-combo').textContent = `×${combo}`;
  document.getElementById('h-time').textContent = Math.ceil(timeLeft);
  document.getElementById('h-level').textContent = level;
  const acc = totalShots > 0 ? Math.round((totalHits / totalShots) * 100) : 0;
  document.getElementById('h-accuracy').textContent = totalShots > 0 ? `${acc}%` : '-';

  // 残り時間が少ないと赤く
  const timeEl = document.getElementById('h-time');
  timeEl.style.color = timeLeft <= 10 ? '#f43f5e' : '#f472b6';
  if (timeLeft <= 5) timeEl.style.animation = 'none'; // pulse effect
}

// ── ゲーム開始/終了 ──
function startGame() {
  state = 'playing';
  score = 0; combo = 0; maxCombo = 0; level = 1;
  timeLeft = GAME_TIME; totalShots = 0; totalHits = 0;
  hitsInLevel = 0; angle = 0;
  targets = []; particles = []; ripples = [];
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('gameover').classList.remove('show');
  updateHUD();
}

function gameOver() {
  state = 'gameover';
  const acc = totalShots > 0 ? Math.round((totalHits / totalShots) * 100) : 0;
  document.getElementById('go-score').textContent = score;
  document.getElementById('go-stats').innerHTML =
    `ヒット: ${totalHits}/${totalShots} (${acc}%)<br>` +
    `最大コンボ: ×${maxCombo}<br>` +
    `到達レベル: ${level}`;
  document.getElementById('gameover').classList.add('show');
}

// ── ゲームループ ──
function loop(now) {
  const dt = lastTime ? Math.min((now - lastTime) / 1000, 0.1) : 0.016;
  lastTime = now;

  update(dt);
  draw();
  if (state === 'playing') updateHUD();
  requestAnimationFrame(loop);
}

// ── イベント ──
canvas.addEventListener('click', e => handleClick(e.clientX, e.clientY));
canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  handleClick(t.clientX, t.clientY);
  mouseX = t.clientX; mouseY = t.clientY;
}, { passive: false });

document.getElementById('btn-start').onclick = startGame;
document.getElementById('btn-retry').onclick = startGame;
window.addEventListener('keydown', e => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'title' || state === 'gameover') startGame();
  }
});
window.addEventListener('resize', resize);

resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
